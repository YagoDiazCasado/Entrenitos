<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenitos SPA</title>
    <link rel="stylesheet" href="estilos3.css">
</head>

<body>

    <section id="login-view" class="view-section active-view">
        <h1>Entrenitos - Iniciar Sesión</h1>
        <form id="login-form">
            <input type="text" id="login-id" placeholder="ID de Usuario" required>
            <input type="password" id="login-pwd" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <button id="btn-to-register" class="btn-secondary">¿No tienes cuenta? Regístrate</button>
    </section>

    <section id="register-view" class="view-section">
        <h1>Crear Cuenta</h1>
        <form id="register-form">
            <input type="text" id="reg-id" placeholder="Elige un ID de Usuario" required>
            <input type="password" id="reg-pass" placeholder="Contraseña" required>
            <button type="submit">Registrarme e Iniciar Sesión</button>
        </form>
        <button id="btn-to-login" class="btn-secondary">Volver al Login</button>
    </section>

    <section id="menu-view" class="view-section">
        <h1 id="menu-title">Hola</h1>
        <div class="flex-row">
            <button id="btn-go-edit" class="btn-secondary">Editar Rutinas</button>
            <button id="btn-logout" class="btn-danger">Salir</button>
        </div>

        <div id="entrenamiento-hoy">
            <h2>Entrenamiento de Hoy</h2>
            <h3 id="hoy-fecha">Calculando...</h3>
            <div id="hoy-contenido"></div>
        </div>
    </section>

    <section id="edit-view" class="view-section">
        <h1>Gestión de Ciclos</h1>
        <button id="btn-go-menu" class="btn-secondary">Volver al Menú</button>

        <div class="flex-row">
            <select id="select-ciclo"></select>
            <label><input type="checkbox" id="chk-ciclo-activo"> Siguiendo este ciclo</label>
        </div>

        <div class="flex-row border-divider">
            <input type="text" id="input-nuevo-ciclo" placeholder="Nombre del nuevo ciclo (ej: Volumen)" class="w-70">
            <button id="btn-crear-ciclo" class="w-25">+ Crear Ciclo</button>
        </div>

        <div id="semanas-container"></div>

        <div class="flex-row">
            <button id="btn-add-semana" class="btn-secondary">+ Añadir Semana</button>
            <button id="btn-guardar-ciclo">Guardar Todo el Ciclo</button>
        </div>
        <span id="save-status" class="status-label"></span>
    </section>

    <script src="app.js"></script>
    <script src="manejadores.js"></script>
    <script src="ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => UIController.init());
    </script>
</body>

</html>
